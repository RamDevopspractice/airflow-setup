# Custom Values for Airflow
# Using Helm templates and persistent volumes for DAG management instead of continuous git sync

executor: KubernetesExecutor

# Disable Git Sync
dags:
  gitSync:
    enabled: false

# Persistent Volume Configuration for DAGs
persistence:
  enabled: true
  storageClassName: standard
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /opt/airflow/dags
  
# Volume claim for DAGs - mount the dags directory directly
volumes:
  - name: dags-pv
    persistentVolumeClaim:
      claimName: airflow-dags-pvc

volumeMounts:
  - name: dags-pv
    mountPath: /opt/airflow/dags
    readOnly: false

# No InitContainer needed - DAGs directory is mounted directly from PV
# Pre-populate the PV with your DAGs before deploying this chart
# Or use a sidecar container to sync DAGs from external source if needed

# Webserver configuration
webserver:
  replicas: 1
  service:
    type: ClusterIP
    ports:
      - name: http
        containerPort: 8080
        servicePort: 8080

# Scheduler configuration
scheduler:
  replicas: 1

# Worker configuration (for KubernetesExecutor)
workers:
  replicas: 0